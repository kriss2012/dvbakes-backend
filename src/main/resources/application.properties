# ============================================================
# DvBakes SaaS Platform - Spring Boot Application Config
# ============================================================

# Application Info
spring.application.name=dvbakes-saas
server.port=${PORT:8080}
server.servlet.context-path=/

# ============================================================
# SQLite Database + HikariCP Connection Pool
# Uses environment variable DATABASE_URL if set (Render), else defaults to local SQLite
# ============================================================
spring.datasource.url=${DATABASE_URL:jdbc:sqlite:bakery_saas.db}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.sqlite.JDBC}
spring.datasource.username=${DATABASE_USERNAME:}
spring.datasource.password=${DATABASE_PASSWORD:}

# HikariCP Connection Pool Settings (Production-Grade)
spring.datasource.hikari.pool-name=DvBakesHikariPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.auto-commit=true

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.community.dialect.SQLiteDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ============================================================
# JWT Security Configuration
# IMPORTANT: Override dvbakes.jwt.secret via environment variable in production!
# ============================================================
dvbakes.jwt.secret=${JWT_SECRET:DvBakesSecretKey2024ProductionSaaSPlatform_HmacSHA256_32BytesMin}
dvbakes.jwt.expiration=${JWT_EXPIRATION:86400000}
dvbakes.jwt.refresh-expiration=604800000

# Admin credentials (MUST be overridden via environment variables in production!)
dvbakes.admin.username=${ADMIN_USERNAME:owner}
dvbakes.admin.password=${ADMIN_PASSWORD:DvBakes@2024!}
dvbakes.admin.passcode=${ADMIN_PASSCODE:1234}

# ============================================================
# CORS Configuration
# In production, set CORS_ALLOWED_ORIGINS to your GitHub Pages URL
# e.g. https://your-username.github.io,https://yourdomain.com
# ============================================================
dvbakes.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:4173,https://kriss2012.github.io}

# ============================================================
# Cache Configuration
# ============================================================
spring.cache.type=simple

# ============================================================
# Actuator (Health + Metrics Endpoints)
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,hikaricp
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.db.enabled=true
management.metrics.export.simple.enabled=true

# ============================================================
# Rate Limiting
# ============================================================
dvbakes.rate-limit.requests-per-minute=60
dvbakes.rate-limit.enabled=true

# ============================================================
# Logging
# ============================================================
logging.level.com.dvbakes=INFO
logging.level.org.springframework.security=WARN
logging.level.com.zaxxer.hikari=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# Server Compression & Performance
# ============================================================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=1024
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=10000
server.tomcat.accept-count=100
